[package]
name = "hashavatar"
version = "0.7.0"
edition = "2024"
rust-version = "1.95"
description = "Deterministic procedural avatars in Rust with configurable identity hashing and WebP, PNG, JPEG, GIF, and SVG export"
license = "MIT OR Apache-2.0"
repository = "https://github.com/valkyoth/hashavatar"
homepage = "https://github.com/valkyoth/hashavatar"
documentation = "https://docs.rs/hashavatar/latest/hashavatar/"
readme = "README.md"
keywords = ["avatar", "identicon", "procedural", "webp", "svg"]
categories = ["multimedia::images", "graphics"]
exclude = ["Screenshot_*.png", "fuzz/**", "target/**"]

[dependencies]
blake3 = { version = "1.8.5", default-features = true, optional = true }
image = { version = "0.25.10", default-features = false, features = ["gif", "jpeg", "png", "webp"] }
palette = { version = "0.7.6", default-features = false, features = ["std"] }
rand = { version = "0.10.1", default-features = false, features = ["std", "std_rng"] }
sha2 = { version = "0.11.0", default-features = false, features = ["alloc"] }
xxhash-rust = { version = "0.8.15", default-features = false, features = ["xxh3"], optional = true }

[features]
default = []
blake3 = ["dep:blake3"]
xxh3 = ["dep:xxhash-rust"]

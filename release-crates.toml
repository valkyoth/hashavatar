[crates.hashavatar]
previous_version = "2.0.0-alpha.4"
version = "2.0.0-alpha.5"
change = "code"
publish = false
reason = "Expose the alpha.5 prepared-request and established-format workflow through the recommended facade; prerelease publication is prohibited."
